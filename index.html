<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <title>Redirecting | Sushi Ben</title>
  <link rel="canonical" href="https://www.sushiben.com/en/">
  <script>
    (function () {
      var supported = ["en", "de", "es", "fr", "it", "pt-br", "ja", "ko", "zh-hans", "zh-hant"];
      function mapLocale(value) {
        if (!value) return "en";
        var lower = String(value).toLowerCase();
        if (lower === "pt" || lower.indexOf("pt-br") === 0) return "pt-br";
        if (lower.indexOf("zh-hant") === 0 || lower.indexOf("zh-tw") === 0 || lower.indexOf("zh-hk") === 0 || lower.indexOf("zh-mo") === 0) return "zh-hant";
        if (lower.indexOf("zh-hans") === 0 || lower.indexOf("zh-cn") === 0 || lower.indexOf("zh-sg") === 0) return "zh-hans";
        var base = lower.split("-")[0];
        return supported.indexOf(base) !== -1 ? base : "en";
      }
      var candidates = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || "en"])
        .map(mapLocale);
      var locale = candidates.find(function (item) { return supported.indexOf(item) !== -1; }) || "en";
      window.location.replace("./" + locale + "/");
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=./en/">
  </noscript>
</head>
<body>
  <p>Redirecting to <a href="./en/">./en/</a>...</p>
</body>
</html>
